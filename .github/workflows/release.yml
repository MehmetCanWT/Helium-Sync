name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: helium-sync-daemon
            asset_name: helium-sync-daemon-linux
          - os: windows-latest
            artifact_name: helium-sync-daemon.exe
            asset_name: helium-sync-daemon-windows.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Backend
        run: cargo build --release --locked

      - name: Rename Artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}
          else
            cp target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}
            tar -czf target/release/helium-sync-daemon-linux.tar.gz -C target/release ${{ matrix.artifact_name }}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.os == 'windows-latest' && 'target/release/helium-sync-daemon-windows.exe' || 'target/release/helium-sync-daemon-linux.tar.gz' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
